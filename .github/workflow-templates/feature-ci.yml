---
# =============================================================================
# Alpine Insight workflow template
# Source:
#   - public template: alpininsight/.github/.github/workflow-templates/feature-ci.yml
#   - private backends:
#     - alpininsight/.github-private/.github/workflows/repository-policy-reusable.yml@main
#     - alpininsight/.github-private/.github/workflows/python-django-quality-reusable.yml@main
# Purpose:
#   - copies the standard Alpine Insight CI caller into the target repository
#   - keeps policy and quality logic private and centrally maintained
# When copied:
#   - keep this header so the source remains visible in downstream repos
#   - adjust python_versions and optional commands for your repository as needed
# =============================================================================

name: Standard CI (Alpine Insight)

on:
  pull_request:
    branches: [develop, main]
  push:
    branches: [develop, main]

concurrency:
  group: ci-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  repository-policy:
    if: ${{ github.event_name == 'pull_request' }}
    permissions:
      contents: read
      pull-requests: read
    uses: alpininsight/.github-private/.github/workflows/repository-policy-reusable.yml@main

  quality:
    permissions:
      contents: read
    uses: alpininsight/.github-private/.github/workflows/python-django-quality-reusable.yml@main
    with:
      python_versions: '["3.13"]'
    secrets:
      github_read_token: ${{ secrets.GITHUB_READ_TOKEN }}
