---
# =============================================================================
# Feature CI - Quality checks for pull requests
# =============================================================================
# Runs linting, formatting, and tests on every PR targeting main or develop.
# Customize the Python matrix and add project-specific steps as needed.
# =============================================================================
name: Feature CI (quality checks)

on:
  pull_request:
    branches: [main, develop]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12", "3.13", "3.14"]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Sync dependencies
        run: uv sync --frozen --dev

      - name: Run pre-commit checks
        run: uvx pre-commit run --all-files

      - name: Lint (ruff)
        run: uv run ruff check .

      - name: Format check (ruff)
        run: uv run ruff format --check .

      - name: Tests (pytest)
        run: uv run pytest

  quality-gate:
    name: Quality Gate
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Gate summary
        env:
          BASE_BRANCH: ${{ github.base_ref }}
        run: |
          echo "## Quality Gate" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Attribute | Value |" >> "$GITHUB_STEP_SUMMARY"
          echo "|-----------|-------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| Target Branch | $BASE_BRANCH |" >> "$GITHUB_STEP_SUMMARY"
          echo "| All checks | passed |" >> "$GITHUB_STEP_SUMMARY"
