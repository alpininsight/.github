---
# =============================================================================
# Alpine Insight workflow template
# Source:
#   - public template: alpininsight/.github/.github/workflow-templates/changelog.yml
#   - private backend: alpininsight/.github-private/.github/workflows/changelog-reusable.yml@main
# Purpose:
#   - copies a thin caller into the target repository
#   - keeps org workflow logic private and centrally maintained
# When copied:
#   - keep this header so the source remains visible in downstream repos
#   - configure CHANGELOG_BOT_TOKEN before enabling auto-merge behavior
# =============================================================================

name: Changelog (Alpine Insight)

on:
  push:
    branches: [develop]
    paths-ignore:
      - CHANGELOG.md
  workflow_dispatch:

concurrency:
  group: changelog-${{ github.ref }}
  cancel-in-progress: true

jobs:
  changelog:
    permissions:
      contents: write
      pull-requests: write
    uses: alpininsight/.github-private/.github/workflows/changelog-reusable.yml@main
    secrets:
      changelog_bot_token: ${{ secrets.CHANGELOG_BOT_TOKEN }}
