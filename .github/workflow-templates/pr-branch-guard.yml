---
# =============================================================================
# Alpine Insight workflow template
# Source:
#   - public template: alpininsight/.github/.github/workflow-templates/pr-branch-guard.yml
#   - private backend: alpininsight/.github-private/.github/workflows/repository-policy-reusable.yml@main
# Purpose:
#   - copies a thin branch-routing caller into the target repository
#   - keeps org branch policy logic private and centrally maintained
# When copied:
#   - keep this header so the source remains visible in downstream repos
#   - this template validates routing only, not PR titles or commit headlines
# =============================================================================

name: PR Branch Guard (Alpine Insight)

on:
  pull_request:
    types: [opened, reopened, synchronize, edited]

jobs:
  branch-policy:
    permissions:
      contents: read
      pull-requests: read
    uses: alpininsight/.github-private/.github/workflows/repository-policy-reusable.yml@main
    with:
      require_conventional_title: false
      require_conventional_commits: false
