---
# =============================================================================
# Alpine Insight workflow template
# Source:
#   - public template: alpininsight/.github/.github/workflow-templates/release.yml
#   - private backend: alpininsight/.github-private/.github/workflows/reusable-release.yml@main
# Purpose:
#   - copies a thin GitVersion release caller into the target repository
#   - keeps org release logic private and centrally maintained
# When copied:
#   - keep this header so the source remains visible in downstream repos
#   - pair this workflow with GitVersion.yml and the Alpine Insight GitVersion template
# =============================================================================

name: Release (Alpine Insight)

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    permissions:
      contents: write
    uses: alpininsight/.github-private/.github/workflows/reusable-release.yml@main
