---
# =============================================================================
# Alpine Insight workflow template
# Source:
#   - public template: alpininsight/.github/.github/workflow-templates/container-build.yml
#   - private backend: alpininsight/.github-private/.github/workflows/python-django-container-build-reusable.yml@main
# Purpose:
#   - copies a thin caller for the Alpine Insight Python/Django container standard
#   - keeps build, publish, and runtime-contract logic private and centrally maintained
# When copied:
#   - replace PUBLIC_BASE_URL with the canonical service URL before enabling runtime smoke
#   - keep the caller thin; extend the private backend instead of forking the logic
# =============================================================================

name: Container Build (Alpine Insight)

on:
  pull_request:
    branches: [develop, main]
  push:
    branches: [develop, main]
  workflow_dispatch:

concurrency:
  group: container-build-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  container:
    permissions:
      contents: read
      packages: write
    uses: alpininsight/.github-private/.github/workflows/python-django-container-build-reusable.yml@main
    with:
      image_name: ghcr.io/${{ github.repository_owner }}/${{ github.event.repository.name }}
      public_base_url: https://replace-me.example.com
      push: ${{ github.event_name == 'push' && github.ref == 'refs/heads/develop' }}
      promote_existing_tree_digest: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
