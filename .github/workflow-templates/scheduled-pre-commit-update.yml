---
# =============================================================================
# Alpine Insight workflow template
# Source:
#   - public template: alpininsight/.github/.github/workflow-templates/scheduled-pre-commit-update.yml
#   - private backend: alpininsight/.github-private/.github/workflows/scheduled-pre-commit-update-reusable.yml@main
# Purpose:
#   - copies a thin pre-commit automation caller into the target repository
#   - keeps org automation logic private and centrally maintained
# When copied:
#   - keep this header so the source remains visible in downstream repos
#   - configure INSIGHT_TOKEN so the automation PR can trigger downstream CI
# =============================================================================

name: Scheduled pre-commit update (Alpine Insight)

on:
  workflow_dispatch:
  schedule:
    - cron: "0 6 * * 1"

jobs:
  autoupdate:
    permissions:
      contents: write
      pull-requests: write
    uses: alpininsight/.github-private/.github/workflows/scheduled-pre-commit-update-reusable.yml@main
    secrets:
      automation_token: ${{ secrets.INSIGHT_TOKEN }}
