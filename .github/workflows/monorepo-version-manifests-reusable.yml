name: Reusable Monorepo Version Manifests

on:
  workflow_call:
    inputs:
      components:
        description: "Comma-separated components (directory names under component_root)"
        required: false
        type: string
        default: ""
      force_all:
        description: "Generate manifests for all discovered components"
        required: false
        type: boolean
        default: false
      component_root:
        description: "Root directory that contains monorepo components"
        required: false
        type: string
        default: "projects"
      base_sha:
        description: "Diff base SHA; if empty, the workflow picks a fallback"
        required: false
        type: string
        default: ""
      head_sha:
        description: "Diff head SHA; defaults to github.sha"
        required: false
        type: string
        default: ""
      artifact_name_prefix:
        description: "Prefix for uploaded artifact names"
        required: false
        type: string
        default: "version-manifest"
    outputs:
      component_count:
        description: "Number of targeted components"
        value: ${{ jobs.delegate.outputs.component_count }}
      component_matrix:
        description: "Component matrix used for manifest generation"
        value: ${{ jobs.delegate.outputs.component_matrix }}

jobs:
  delegate:
    name: Delegate to private central workflow
    permissions:
      contents: read
    uses: alpininsight/.github-private/.github/workflows/monorepo-version-manifests-reusable.yml@develop
    with:
      components: ${{ inputs.components }}
      force_all: ${{ inputs.force_all }}
      component_root: ${{ inputs.component_root }}
      base_sha: ${{ inputs.base_sha }}
      head_sha: ${{ inputs.head_sha }}
      artifact_name_prefix: ${{ inputs.artifact_name_prefix }}
