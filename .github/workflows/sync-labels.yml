name: Sync Labels

on:
  push:
    branches: [main]
    paths:
      - ".github/labels.yml"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run (no changes)"
        required: false
        default: "false"
        type: boolean
  schedule:
    - cron: "0 0 * * 0"

jobs:
  sync-labels:
    name: Delegate to private central workflow
    permissions:
      contents: read
    uses: alpininsight/.github-private/.github/workflows/sync-labels.yml@develop
    with:
      dry_run: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.dry_run == 'true' }}
    secrets:
      org_label_sync_token: ${{ secrets.ORG_LABEL_SYNC_TOKEN }}
