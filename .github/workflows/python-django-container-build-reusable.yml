name: Python/Django Container Build (reusable)

on:
  workflow_call:
    inputs:
      image_name:
        description: Full container image name, for example ghcr.io/alpininsight/insight-ui-flow.
        required: true
        type: string
      context:
        description: Docker build context.
        required: false
        type: string
        default: "."
      dockerfile:
        description: Path to the Dockerfile relative to the repository root.
        required: false
        type: string
        default: "Dockerfile"
      target:
        description: Optional Docker build target.
        required: false
        type: string
        default: ""
      platforms:
        description: Comma-separated Docker platforms.
        required: false
        type: string
        default: "linux/amd64"
      push:
        description: Push the image after a successful build.
        required: false
        type: boolean
        default: false
      pre_build_command:
        description: Optional shell commands to run before docker metadata/build steps.
        required: false
        type: string
        default: ""
      build_args:
        description: Multiline Docker build arguments.
        required: false
        type: string
        default: ""
      additional_tags:
        description: Additional docker/metadata-action tag definitions.
        required: false
        type: string
        default: ""
    secrets:
      github_read_token:
        description: Optional read token for private GitHub dependencies during docker build.
        required: false
      registry_username:
        description: Optional registry username for push workflows.
        required: false
      registry_password:
        description: Optional registry password for push workflows.
        required: false

jobs:
  delegate:
    name: Delegate to private central workflow
    permissions:
      contents: read
      packages: write
    uses: alpininsight/.github-private/.github/workflows/python-django-container-build-reusable.yml@develop
    with:
      image_name: ${{ inputs.image_name }}
      context: ${{ inputs.context }}
      dockerfile: ${{ inputs.dockerfile }}
      target: ${{ inputs.target }}
      platforms: ${{ inputs.platforms }}
      push: ${{ inputs.push }}
      pre_build_command: ${{ inputs.pre_build_command }}
      build_args: ${{ inputs.build_args }}
      additional_tags: ${{ inputs.additional_tags }}
    secrets:
      github_read_token: ${{ secrets.github_read_token }}
      registry_username: ${{ secrets.registry_username }}
      registry_password: ${{ secrets.registry_password }}
