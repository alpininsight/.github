name: Release Backlog Advisory

on:
  workflow_call:
    inputs:
      base-ref:
        description: Git ref that represents the release branch baseline.
        required: false
        type: string
        default: origin/main
      head-ref:
        description: Git ref that represents the integration branch being compared.
        required: false
        type: string
        default: origin/develop
      pr-number:
        description: Pull request number to comment on.
        required: true
        type: number
      substantive-threshold:
        description: Minimum number of substantive changed files before advisory comment.
        required: false
        type: number
        default: 5
      total-threshold:
        description: Minimum total changed files before strong advisory comment.
        required: false
        type: number
        default: 15

permissions:
  contents: read
  pull-requests: write

jobs:
  release-backlog-advisory:
    name: Release Backlog Advisory
    runs-on: ubuntu-latest
    steps:
      - name: Checkout caller repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
        with:
          fetch-depth: 0

      - name: Evaluate tree diff backlog
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          PR_NUMBER: ${{ inputs.pr-number }}
          BASE_REF: ${{ inputs.base-ref }}
          HEAD_REF: ${{ inputs.head-ref }}
          SUBSTANTIVE_THRESHOLD: ${{ inputs.substantive-threshold }}
          TOTAL_THRESHOLD: ${{ inputs.total-threshold }}
        run: |
          python3 - <<'PY'
          import json
          import os
          import subprocess
          from pathlib import PurePosixPath

          COMMENT_MARKER = "<!-- release-backlog-advisory -->"
          NON_SUBSTANTIVE_PATTERNS = (
              "CHANGELOG.md",
              "*.md",
              "*.mdx",
              "docs/**",
              ".github/ISSUE_TEMPLATE/**",
              ".github/PULL_REQUEST_TEMPLATE/**",
              ".github/README.md",
              ".github/labels.yml",
              ".gitignore",
              ".gitattributes",
              ".editorconfig",
              "CODE_OF_CONDUCT.md",
              "CONTRIBUTING.md",
              "CONTRIBUTORS.md",
              "LICENSE*",
              "SECURITY.md",
              "SUPPORT.md",
          )

          def changed_paths(base_ref: str, head_ref: str) -> list[str]:
              proc = subprocess.run(
                  [
                      "git",
                      "diff",
                      "--name-only",
                      "--diff-filter=ACDMRTUXB",
                      "-M",
                      f"{base_ref}..{head_ref}",
                  ],
                  check=True,
                  capture_output=True,
                  text=True,
              )
              return [line.strip() for line in proc.stdout.splitlines() if line.strip()]

          def is_non_substantive(path: str) -> bool:
              pure = PurePosixPath(path)
              return any(pure.match(pattern) for pattern in NON_SUBSTANTIVE_PATTERNS)

          def build_comment(base_ref: str, head_ref: str, substantive: list[str], total_paths: list[str]) -> tuple[bool, str]:
              total_files = len(total_paths)
              substantive_files = len(substantive)
              non_substantive_files = total_files - substantive_files
              substantive_threshold = int(os.environ["SUBSTANTIVE_THRESHOLD"])
              total_threshold = int(os.environ["TOTAL_THRESHOLD"])

              should_advise = False
              severity = "none"
              if substantive:
                  if total_files > total_threshold:
                      should_advise = True
                      severity = "strong"
                  elif substantive_files > substantive_threshold:
                      should_advise = True
                      severity = "consider"

              headline = (
                  f"{COMMENT_MARKER}\n"
                  f"**Release backlog advisory:** `{head_ref}` differs from `{base_ref}` in "
                  f"**{substantive_files} substantive** / **{total_files} total** files."
              )
              excluded = (
                  f"Excluded from substantive count: **{non_substantive_files}** "
                  "docs/changelog/meta files."
              )
              listed = ", ".join(f"`{path}`" for path in substantive[:10]) or "_none_"
              paths_line = f"Substantive paths: {listed}"
              if len(substantive) > 10:
                  paths_line += f", and {len(substantive) - 10} more."

              if severity == "strong":
                  recommendation = (
                      f"Strongly recommend a release PR (threshold: {total_threshold} total files)."
                  )
              elif severity == "consider":
                  recommendation = (
                      "Consider a release PR "
                      f"(threshold: {substantive_threshold} substantive files)."
                  )
              else:
                  recommendation = "No release PR recommendation at the configured thresholds."

              return should_advise, "\n\n".join((headline, excluded, paths_line, recommendation))

          def find_existing_comment(pr_number: str) -> dict | None:
              proc = subprocess.run(
                  ["gh", "api", f"repos/{os.environ['GITHUB_REPOSITORY']}/issues/{pr_number}/comments"],
                  check=True,
                  capture_output=True,
                  text=True,
              )
              comments = json.loads(proc.stdout)
              return next((comment for comment in comments if COMMENT_MARKER in comment.get("body", "")), None)

          def upsert_comment(pr_number: str, body: str) -> None:
              existing = find_existing_comment(pr_number)
              if existing:
                  subprocess.run(
                      [
                          "gh",
                          "api",
                          "-X",
                          "PATCH",
                          f"repos/{os.environ['GITHUB_REPOSITORY']}/issues/comments/{existing['id']}",
                          "-f",
                          f"body={body}",
                      ],
                      check=True,
                  )
                  return
              subprocess.run(["gh", "pr", "comment", pr_number, "--body", body], check=True)

          def delete_comment_if_present(pr_number: str) -> None:
              existing = find_existing_comment(pr_number)
              if not existing:
                  return
              subprocess.run(
                  [
                      "gh",
                      "api",
                      "-X",
                      "DELETE",
                      f"repos/{os.environ['GITHUB_REPOSITORY']}/issues/comments/{existing['id']}",
                  ],
                  check=True,
              )

          base_ref = os.environ["BASE_REF"]
          head_ref = os.environ["HEAD_REF"]
          pr_number = os.environ["PR_NUMBER"]
          total_paths = changed_paths(base_ref, head_ref)
          substantive_paths = [path for path in total_paths if not is_non_substantive(path)]
          should_advise, body = build_comment(base_ref, head_ref, substantive_paths, total_paths)

          print(body)
          if should_advise:
              upsert_comment(pr_number, body)
          else:
              delete_comment_if_present(pr_number)
          PY
