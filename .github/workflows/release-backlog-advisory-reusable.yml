name: Release Backlog Advisory

on:
  workflow_call:
    inputs:
      base-ref:
        description: Git ref that represents the release branch baseline.
        required: false
        type: string
        default: origin/main
      head-ref:
        description: Git ref that represents the integration branch being compared.
        required: false
        type: string
        default: origin/develop
      pr-number:
        description: Pull request number to comment on.
        required: true
        type: number
      substantive-threshold:
        description: Minimum number of substantive changed files before advisory comment.
        required: false
        type: number
        default: 5
      total-threshold:
        description: Minimum total changed files before strong advisory comment.
        required: false
        type: number
        default: 15

jobs:
  delegate:
    name: Delegate to private central workflow
    permissions:
      contents: read
      pull-requests: write
    uses: alpininsight/.github-private/.github/workflows/release-backlog-advisory-reusable.yml@develop
    with:
      base-ref: ${{ inputs.base-ref }}
      head-ref: ${{ inputs.head-ref }}
      pr-number: ${{ inputs.pr-number }}
      substantive-threshold: ${{ inputs.substantive-threshold }}
      total-threshold: ${{ inputs.total-threshold }}
