name: Repository Policy (reusable)

on:
  workflow_call:
    inputs:
      main_branch:
        description: Release branch that may only receive PRs from develop.
        required: false
        type: string
        default: main
      develop_branch:
        description: Integration branch for normal development.
        required: false
        type: string
        default: develop
      require_conventional_title:
        description: Require PR titles to follow Conventional Commits.
        required: false
        type: boolean
        default: true
      require_conventional_commits:
        description: Require all PR commit headlines to follow Conventional Commits.
        required: false
        type: boolean
        default: true

jobs:
  delegate:
    name: Delegate to private central workflow
    permissions:
      contents: read
      pull-requests: read
    uses: alpininsight/.github-private/.github/workflows/repository-policy-reusable.yml@develop
    with:
      main_branch: ${{ inputs.main_branch }}
      develop_branch: ${{ inputs.develop_branch }}
      require_conventional_title: ${{ inputs.require_conventional_title }}
      require_conventional_commits: ${{ inputs.require_conventional_commits }}
